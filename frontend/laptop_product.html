<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laptop Details - Vishal Sales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #00bfff;
      --secondary-blue: #0066cc;
      --dark-bg: #0b0c1e;
      --card-bg: #1b1c33;
      --card-bg-hover: #20224a;
      --accent-gold: #ffcc00;
      --text-light: #ddd;
      --success-green: #00ff99;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      background: linear-gradient(135deg, var(--dark-bg), #1a1a2e, #16213e);
      color: #f1f1f1; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
    }

    /* Vendor Comparison Section */
    .vendor-comparison {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .vendor-card {
      background: linear-gradient(145deg, rgba(27, 28, 51, 0.8), rgba(32, 34, 74, 0.6));
      border: 2px solid rgba(0, 191, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .vendor-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary-blue);
      box-shadow: 0 10px 30px rgba(0, 191, 255, 0.3);
    }

    .vendor-card.best-price {
      border-color: var(--accent-gold);
      background: linear-gradient(145deg, rgba(255, 204, 0, 0.1), rgba(27, 28, 51, 0.8));
    }

    .best-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: linear-gradient(45deg, var(--accent-gold), #ffa500);
      color: var(--dark-bg);
      padding: 5px 15px;
      border-radius: 0 15px 0 15px;
      font-size: 0.75rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 4px 10px rgba(255, 204, 0, 0.4);
    }

    .vendor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .vendor-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--primary-blue);
      margin: 0;
    }

    .vendor-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-gold);
      font-size: 0.9rem;
      font-weight: bold;
    }

    .vendor-price {
      margin: 15px 0;
    }

    .vendor-discount-price {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--success-green);
      margin-bottom: 5px;
    }

    .vendor-original-price {
      font-size: 1rem;
      color: #888;
      text-decoration: line-through;
      margin-right: 10px;
    }

    .vendor-discount-badge {
      background: linear-gradient(45deg, #ff6b35, #f7931e);
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .vendor-buy-btn {
      display: block;
      width: 100%;
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 15px;
    }

    .vendor-buy-btn:hover {
      background: linear-gradient(45deg, var(--secondary-blue), #004499);
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 191, 255, 0.4);
      color: white;
    }

    .vendor-card.best-price .vendor-buy-btn {
      background: linear-gradient(45deg, var(--accent-gold), #ffa500);
      color: var(--dark-bg);
    }

    .vendor-card.best-price .vendor-buy-btn:hover {
      background: linear-gradient(45deg, #ffa500, #ff8c00);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--dark-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      border-radius: 10px;
    }

    /* Header Section */
    .header-section {
      background: linear-gradient(135deg, rgba(13, 27, 42, 0.95), rgba(27, 28, 51, 0.8));
      backdrop-filter: blur(10px);
      padding: 20px 0;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(0, 191, 255, 0.2);
    }

    .page-title {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(45deg, var(--primary-blue), #ffffff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 10px;
    }

    .breadcrumb-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 1rem;
      color: var(--text-light);
    }

    .breadcrumb-nav a {
      color: var(--primary-blue);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .breadcrumb-nav a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px var(--primary-blue);
    }

    /* Product Card */
    .product-card { 
      background: linear-gradient(145deg, var(--card-bg), var(--card-bg-hover));
      border-radius: 20px; 
      padding: 40px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(0, 191, 255, 0.2);
      margin-bottom: 30px;
    }

    .product-image {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .product-image img {
      width: 100%;
      max-width: 500px;
      height: auto;
      object-fit: contain;
      border-radius: 15px;
      background: linear-gradient(135deg, #ffffff, #f8f9fa);
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: block;
      margin: 0 auto;
      transition: all 0.3s ease;
    }

    .product-image img:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(0, 191, 255, 0.2);
    }

    .product-title {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--primary-blue);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .product-brand {
      font-size: 1.2rem;
      color: var(--text-light);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .product-brand i {
      color: var(--primary-blue);
    }

    .price-section {
      margin: 25px 0;
      padding: 20px;
      background: rgba(0, 191, 255, 0.05);
      border-radius: 15px;
      border-left: 4px solid var(--primary-blue);
    }

    .price .discount { 
      color: var(--success-green); 
      font-weight: bold; 
      font-size: 2rem;
      margin-right: 15px; 
    }

    .price .original { 
      text-decoration: line-through; 
      color: #888; 
      font-size: 1.3rem;
      margin-right: 15px;
    }

    .discount-percent {
      background: linear-gradient(45deg, #ff6b35, #f7931e);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: bold;
      display: inline-block;
    }

    .rating { 
      color: var(--accent-gold); 
      font-size: 1.3rem; 
      margin: 15px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rating-stars {
      display: flex;
      gap: 2px;
    }

    .section-title {
      margin: 30px 0 20px 0; 
      color: var(--primary-blue);
      font-size: 1.5rem;
      font-weight: bold;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(0, 191, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .offers-list, .specs-list {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .offers-list li, .specs-list li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .offers-list li:last-child, .specs-list li:last-child {
      border-bottom: none;
    }

    .offers-list li i {
      color: var(--success-green);
      margin-top: 2px;
      flex-shrink: 0;
    }

    .specs-list li i {
      color: var(--primary-blue);
      margin-top: 2px;
      flex-shrink: 0;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .btn-buy-now {
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: center;
      min-width: 200px;
    }

    .btn-buy-now:hover {
      background: linear-gradient(45deg, var(--secondary-blue), #004499);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 191, 255, 0.4);
      color: white;
    }

    .btn-back {
      background: linear-gradient(45deg, #6c757d, #495057);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .btn-back:hover {
      background: linear-gradient(45deg, #495057, #343a40);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      color: white;
    }

    /* Loading and Error States */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 400px;
      font-size: 1.2rem;
      color: var(--primary-blue);
    }

    .spinner {
      border: 3px solid rgba(0, 191, 255, 0.3);
      border-top: 3px solid var(--primary-blue);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      border-radius: 15px;
      margin: 20px 0;
    }

    .error-state i {
      font-size: 4rem;
      color: #dc3545;
      margin-bottom: 20px;
    }

    .error-state h3 {
      color: #dc3545;
      margin-bottom: 15px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .product-card {
        padding: 20px;
      }
      
      .product-title {
        font-size: 1.8rem;
      }
      
      .price .discount {
        font-size: 1.5rem;
      }
      
      .action-buttons {
        flex-direction: column;
      }
      
      .btn-buy-now {
        min-width: auto;
      }

      .vendor-comparison {
        grid-template-columns: 1fr;
      }
    }

    /* Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-card {
      animation: fadeInUp 0.6s ease forwards;
    }
  </style>
</head>

  // Navigation functions
  window.goToHome = function() {

  };

    // In real implementation: window.location.href = "laptop.html";
  };

  function generateStars(rating) {
    const fullStars = Math.floor(rating);
    const hasHalfStar = rating % 1 !== 0;
    let starsHtml = '';
    
    for (let i = 0; i < fullStars; i++) {
      starsHtml += '<i class="fas fa-star"></i>';
    }
    
    if (hasHalfStar) {
      starsHtml += '<i class="fas fa-star-half-alt"></i>';
    }
    
    const emptyStars = 5 - Math.ceil(rating);
    for (let i = 0; i < emptyStars; i++) {
      starsHtml += '<i class="far fa-star"></i>';
    }
    
    return starsHtml;
  }

  function formatPrice(price) {
    return new Intl.NumberFormat('en-IN').format(price);
  }

  function calculateDiscount(originalPrice, discountedPrice) {
    return Math.round(((originalPrice - discountedPrice) / originalPrice) * 100);
  }

  function loadProductDetails() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    if (!productId) {
      showError("No product ID provided");
      return;
    }

    // Fetch from API
    fetch(`http://127.0.0.1:8000/api/product/${productId}`)
      .then(response => {
        if (!response.ok) throw new Error('Product not found');
        return response.json();
      })
      .then(product => {
        displayProduct(product);
      })
      .catch(err => {
        console.error("Error loading product:", err);
        showError("Product not found or server error");
      });
  }

  function displayProduct(product) {
    try {
      // Handle image URL
      let imageUrl = 'https://via.placeholder.com/500x400/6c757d/ffffff?text=No+Image+Available';
      if (product.image && product.image.thumbnail) {
        imageUrl = product.image.thumbnail;
      } else if (product.image && product.image.urls && Array.isArray(product.image.urls) && product.image.urls.length > 0) {
        imageUrl = product.image.urls[0];
      } else if (product.image && typeof product.image === 'string') {
        imageUrl = product.image;
      }

      // Extract all vendors data
      let vendors = [];
      let bestPrice = Infinity;
      let bestVendor = null;

      if (product.vendors) {
        for (const [vendorName, vendorData] of Object.entries(product.vendors)) {
          if (vendorData && vendorData.discountprice) {
            vendors.push({
              name: vendorName,
              price: vendorData.price || 0,
              discountprice: vendorData.discountprice || 0,
              rating: vendorData.rating || 0,
              affiliatelink: vendorData.affiliatelink || '#',
              offers: vendorData.offers || []
            });
            
            // Find best price
            if (vendorData.discountprice < bestPrice) {
              bestPrice = vendorData.discountprice;
              bestVendor = {
                name: vendorName,
                ...vendorData
              };
            }
          }
        }
      }

      // Use best vendor for main display
      const originalPrice = bestVendor?.price || 0;
      const discountPrice = bestVendor?.discountprice || 0;
      const rating = bestVendor?.rating || 0;
      const affiliateLink = bestVendor?.affiliatelink || '#';
      const offers = bestVendor?.offers || [];

      // Calculate discount percentage
      const discountPercent = calculateDiscount(originalPrice, discountPrice);

      // Generate vendor comparison cards
      const vendorLogos = {
        'Flipkart': 'https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png',
        'Amazon': 'https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg',
        'Croma': 'https://www.croma.com/assets/croma-logo.svg',
        'JioMart': 'https://www.jiomart.com/assets/ds2web/jiomart-logo.svg',
        'VijaySales': 'https://www.vijaysales.com/images/logo.png'
      };

      let vendorCardsHTML = '';
      if (vendors.length > 0) {
        vendorCardsHTML = `
          <h5 class="section-title">
            <i class="fas fa-store"></i> Compare Prices Across Stores
          </h5>
          <div class="vendor-comparison">
            ${vendors.map(vendor => {
              const discount = calculateDiscount(vendor.price, vendor.discountprice);
              const isBestPrice = vendor.discountprice === bestPrice;
              return `
                <div class="vendor-card ${isBestPrice ? 'best-price' : ''}">
                  ${isBestPrice ? '<div class="best-badge"><i class="fas fa-crown"></i> Best Price</div>' : ''}
                  <div class="vendor-header">
                    <h6 class="vendor-name">${vendor.name}</h6>
                    ${vendor.rating > 0 ? `
                      <div class="vendor-rating">
                        <i class="fas fa-star"></i> ${vendor.rating}
                      </div>
                    ` : ''}
                  </div>
                  <div class="vendor-price">
                    <span class="vendor-discount-price">₹${formatPrice(vendor.discountprice)}</span>
                    ${vendor.price > vendor.discountprice ? `
                      <span class="vendor-original-price">₹${formatPrice(vendor.price)}</span>
                      <span class="vendor-discount-badge">${discount}% OFF</span>
                    ` : ''}
                  </div>
                  <a href="${vendor.affiliatelink}" target="_blank" class="vendor-buy-btn">
                    <i class="fas fa-shopping-cart"></i> Buy Now
                  </a>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      // Generate offers HTML
      let offersHTML = "";
      if (offers && offers.length) {
        offersHTML = `
          <h5 class="section-title">
            <i class="fas fa-gift"></i> Special Offers
          </h5>
          <ul class="offers-list list-unstyled">
            ${offers.map(offer => `
              <li><i class="fas fa-check-circle"></i> <span>${offer}</span></li>
            `).join('')}
          </ul>
        `;
      }

      // Generate specifications HTML
      let specsHTML = "";
      if (product.features && product.features.details) {
        specsHTML = `
          <h5 class="section-title">
            <i class="fas fa-cogs"></i> Technical Specifications
          </h5>
          <ul class="specs-list list-unstyled">
        `;
        
        const details = product.features.details;
        for (const section in details) {
          for (const key in details[section]) {
            if (details[section][key]) {
              const formattedKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
              specsHTML += `
                <li>
                  <i class="fas fa-circle"></i> 
                  <span><strong>${formattedKey}:</strong> ${details[section][key]}</span>
                </li>
              `;
            }
          }
        }
        specsHTML += "</ul>";
      }

      document.getElementById("product-details").innerHTML = `
        <div class="product-card">
          <div class="row g-4 align-items-start">
            <!-- Image -->
            <div class="col-lg-5">
              <div class="product-image">
                <img src="${imageUrl}" alt="${product.title}" 
                     onerror="this.src='https://via.placeholder.com/500x400/6c757d/ffffff?text=Image+Not+Found'">
              </div>
            </div>

            <!-- Details -->
            <div class="col-lg-7">
              <h1 class="product-title">${product.title}</h1>
              
              <div class="product-brand">
                <i class="fas fa-tag"></i>
                <span><strong>Brand:</strong> ${product.brand}</span>
              </div>
              
              <div class="price-section">
                <div class="price">
                  <span class="discount">₹${formatPrice(discountPrice)}</span>
                  ${originalPrice > discountPrice ? 
                    `<span class="original">₹${formatPrice(originalPrice)}</span>
                     <span class="discount-percent">${discountPercent}% OFF</span>` : ''
                  }
                </div>
              </div>
              
              <div class="rating">
                <div class="rating-stars">${generateStars(rating)}</div>
                <span>${rating || 'N/A'} out of 5</span>
              </div>

              <div class="action-buttons">
                ${affiliateLink && affiliateLink !== '#' ? 
                  `<a href="${affiliateLink}" target="_blank" class="btn-buy-now">
                    <i class="fas fa-shopping-cart"></i> Buy Now
                  </a>` :
                  `<button onclick="alert('Purchase link not available')" class="btn-buy-now">
                    <i class="fas fa-shopping-cart"></i> Buy Now
                  </button>`
                }
              </div>
            </div>
          </div>

          <!-- Additional Information -->
          <div class="row mt-4">
            <div class="col-12">
              ${vendorCardsHTML}
              ${offersHTML}
              ${specsHTML}
            </div>
          </div>
        </div>
      `;

    } catch (error) {
      console.error("Error displaying product:", error);
      showError("Error loading product details");
    }
  }

  function showError(message) {
    document.getElementById("product-details").innerHTML = `
      <div class="error-state">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Oops! Something went wrong</h3>
        <p>${message}</p>
        <button class="btn btn-primary mt-3" onclick="location.reload()">
          <i class="fas fa-refresh"></i> Try Again
        </button>
        <button class="btn btn-secondary mt-3 ms-2" onclick="goToLaptops()">
          <i class="fas fa-arrow-left"></i> Back to Laptops
        </button>
      </div>
    `;
  }

  // Initialize the page
  document.addEventListener("DOMContentLoaded", function () {
    loadProductDetails();
  });

  // Global error handler
  window.addEventListener('error', function(e) {
    console.error('Global error:', e.error);
    showError("An unexpected error occurred");
  });
  </script>

</body>
</html>
