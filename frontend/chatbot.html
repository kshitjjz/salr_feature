<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant | Professional Support</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e8e9ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Animated background particles */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.1;
    }

    .particle {
      position: absolute;
      background: #4a90e2;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    .chat-wrapper {
      width: 100%;
      max-width: 800px;
      height: 700px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 40px;
    }

    /* Animated Robot Styles */
    .robot-container {
      position: relative;
      width: 200px;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: robotFloat 4s ease-in-out infinite;
    }

    @keyframes robotFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .robot {
      position: relative;
      z-index: 2;
    }

    .robot-head {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      border-radius: 20px;
      position: relative;
      margin-bottom: 10px;
      box-shadow: 0 0 20px rgba(74, 144, 226, 0.4);
      animation: headTilt 3s ease-in-out infinite;
    }

    @keyframes headTilt {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    .robot-eye {
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 25px;
      animation: eyeBlink 4s infinite;
    }

    .left-eye {
      left: 20px;
    }

    .right-eye {
      right: 20px;
    }

    @keyframes eyeBlink {
      0%, 95%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }

    .robot-antenna {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 15px;
      background: #4a90e2;
    }

    .antenna-ball {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      position: absolute;
      top: -6px;
      left: -3px;
      animation: antennaPulse 2s infinite;
      box-shadow: 0 0 10px #4ade80;
    }

    @keyframes antennaPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    .robot-body {
      width: 100px;
      height: 120px;
      background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
      border-radius: 15px;
      position: relative;
      border: 2px solid rgba(74, 144, 226, 0.3);
      margin-bottom: 15px;
    }

    .robot-screen {
      width: 60px;
      height: 40px;
      background: rgba(74, 144, 226, 0.2);
      border-radius: 8px;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 1px solid rgba(74, 144, 226, 0.4);
    }

    .screen-line {
      width: 40px;
      height: 2px;
      background: #4a90e2;
      border-radius: 1px;
      animation: screenFlicker 2s infinite;
    }

    .screen-line:nth-child(2) {
      width: 30px;
      animation-delay: 0.5s;
    }

    .screen-line:nth-child(3) {
      width: 35px;
      animation-delay: 1s;
    }

    @keyframes screenFlicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .robot-buttons {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .robot-button {
      width: 12px;
      height: 12px;
      background: #4a90e2;
      border-radius: 50%;
      animation: buttonGlow 3s infinite;
    }

    .robot-button:nth-child(2) {
      animation-delay: 1.5s;
    }

    @keyframes buttonGlow {
      0%, 100% { 
        background: #4a90e2;
        box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
      }
      50% { 
        background: #4ade80;
        box-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
      }
    }

    .robot-arms {
      position: absolute;
      top: 90px;
      width: 140px;
      height: 20px;
    }

    .robot-arm {
      position: absolute;
      width: 30px;
      height: 8px;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      border-radius: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    .left-arm {
      left: -35px;
      animation: leftArmWave 4s ease-in-out infinite;
      transform-origin: right center;
    }

    .right-arm {
      right: -35px;
      animation: rightArmWave 4s ease-in-out infinite;
      transform-origin: left center;
    }

    @keyframes leftArmWave {
      0%, 100% { transform: translateY(-50%) rotate(0deg); }
      25% { transform: translateY(-50%) rotate(-20deg); }
      75% { transform: translateY(-50%) rotate(10deg); }
    }

    @keyframes rightArmWave {
      0%, 100% { transform: translateY(-50%) rotate(0deg); }
      25% { transform: translateY(-50%) rotate(10deg); }
      75% { transform: translateY(-50%) rotate(-20deg); }
    }

    .robot-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(74, 144, 226, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 3s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes glowPulse {
      0%, 100% { 
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1);
      }
      50% { 
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .chat-container {
      width: 480px;
      height: 100%;
      background: rgba(15, 15, 23, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 
                  0 0 0 1px rgba(74, 144, 226, 0.2),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(74, 144, 226, 0.15);
      overflow: hidden;
      position: relative;
    }

    .chat-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #4a90e2, transparent);
      opacity: 0.6;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1a1a2e, #0f0f17);
      padding: 24px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(74, 144, 226, 0.1);
      position: relative;
    }

    .back-home-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: rgba(74, 144, 226, 0.1);
      border: 1px solid rgba(74, 144, 226, 0.2);
      color: #4a90e2;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .back-home-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(74, 144, 226, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .back-home-btn:hover {
      background: rgba(74, 144, 226, 0.2);
      border-color: #4a90e2;
      transform: translateX(-2px);
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
    }

    .back-home-btn:hover::before {
      left: 100%;
    }

    .back-home-btn:active {
      transform: translateX(-1px) scale(0.95);
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: #6b7280;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .menu-btn:hover {
      background: rgba(74, 144, 226, 0.1);
      color: #4a90e2;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
      100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
    }

    .bot-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
    }

    .header-info {
      flex: 1;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #e8e9ea, #a0a0a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Messages */
    .chat-body {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0.1), rgba(26, 26, 46, 0.1));
      position: relative;
    }

    .message {
      margin: 16px 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: messageSlide 0.3s ease-out;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .bot .message-avatar {
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: white;
    }

    .user .message-avatar {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
    }

    .message-content {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      position: relative;
    }

    .bot .message-content {
      background: rgba(74, 144, 226, 0.1);
      border: 1px solid rgba(74, 144, 226, 0.2);
      color: #e8e9ea;
      border-bottom-left-radius: 8px;
    }

    .user .message-content {
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .message-time {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
      text-align: center;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: rgba(74, 144, 226, 0.1);
      border: 1px solid rgba(74, 144, 226, 0.2);
      border-radius: 20px;
      border-bottom-left-radius: 8px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: #4a90e2;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Input Section */
    .chat-footer {
      padding: 20px;
      background: rgba(15, 15, 23, 0.8);
      border-top: 1px solid rgba(74, 144, 226, 0.1);
      backdrop-filter: blur(20px);
    }

    .input-container {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(26, 26, 46, 0.6);
      border: 1px solid rgba(74, 144, 226, 0.2);
      border-radius: 24px;
      padding: 4px;
      transition: all 0.3s ease;
    }

    .input-container:focus-within {
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }

    .chat-input {
      flex: 1;
      padding: 14px 20px;
      border: none;
      outline: none;
      background: transparent;
      color: #e8e9ea;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
    }

    .chat-input::placeholder {
      color: #6b7280;
    }

    .send-button {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .send-button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(74, 144, 226, 0.3);
    }

    .send-button:active {
      transform: scale(0.95);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .quick-action {
      padding: 8px 16px;
      background: rgba(74, 144, 226, 0.1);
      border: 1px solid rgba(74, 144, 226, 0.2);
      border-radius: 16px;
      font-size: 13px;
      color: #4a90e2;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .quick-action:hover {
      background: rgba(74, 144, 226, 0.2);
      transform: translateY(-2px);
    }

    /* Scrollbar */
    .chat-body::-webkit-scrollbar {
      width: 4px;
    }

    .chat-body::-webkit-scrollbar-track {
      background: rgba(74, 144, 226, 0.05);
    }

    .chat-body::-webkit-scrollbar-thumb {
      background: rgba(74, 144, 226, 0.3);
      border-radius: 4px;
    }

    .chat-body::-webkit-scrollbar-thumb:hover {
      background: rgba(74, 144, 226, 0.5);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .chat-wrapper {
        flex-direction: column;
        max-width: 480px;
        gap: 20px;
      }
      
      .robot-container {
        width: 150px;
        height: 200px;
        transform: scale(0.8);
      }
      
      .chat-container {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .chat-wrapper {
        height: 100vh;
        max-width: 100%;
        padding: 10px;
      }
      
      .robot-container {
        display: none;
      }
      
      .chat-container {
        border-radius: 0;
        height: 100%;
        width: 100%;
      }

      .chat-body {
        padding: 20px 16px;
      }

      .chat-footer {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation" id="bgAnimation"></div>

  <div class="chat-wrapper">
    <!-- Animated Robot -->
    <div class="robot-container">
      <div class="robot">
        <div class="robot-head">
          <div class="robot-eye left-eye"></div>
          <div class="robot-eye right-eye"></div>
          <div class="robot-antenna">
            <div class="antenna-ball"></div>
          </div>
        </div>
        <div class="robot-body">
          <div class="robot-screen">
            <div class="screen-line"></div>
            <div class="screen-line"></div>
            <div class="screen-line"></div>
          </div>
          <div class="robot-buttons">
            <div class="robot-button"></div>
            <div class="robot-button"></div>
          </div>
        </div>
        <div class="robot-arms">
          <div class="robot-arm left-arm"></div>
          <div class="robot-arm right-arm"></div>
        </div>
      </div>
      <div class="robot-glow"></div>
    </div>

    <div class="chat-container">
       
      <div class="chat-header">
        <div class="chat-header">
        <a href="index.html" class="back-home-btn" title="Back to Home">
        <i class="fas fa-arrow-left"></i>
        </a>
      </div>

        <div class="bot-avatar">
          <i class="fas fa-robot"></i>
        </div>
        <div class="header-info">
          <div class="header-title">Vishal Sales</div>
          <div class="header-subtitle">
            <div class="status-dot"></div>
            Online • Ready to help
          </div>
        </div>
        <button class="menu-btn" onclick="toggleMenu()" title="Menu">
          <i class="fas fa-ellipsis-v"></i>
        </button>
      </div>

      <div class="chat-body" id="chatBody">
        <div class="message bot">
          <div class="message-avatar">AI</div>
          <div>
            <div class="message-content">
              👋 Hello! I'm your AI assistant. How can I help you today?
            </div>
            <div class="message-time">Just now</div>
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <div class="quick-actions">
          <div class="quick-action" onclick="sendQuickMessage('Help with orders')">📦 Orders</div>
          <div class="quick-action" onclick="sendQuickMessage('Technical support')">🔧 Support</div>
          <div class="quick-action" onclick="sendQuickMessage('Account information')">👤 Account</div>
        </div>
        
        <div class="input-container">
          <textarea 
            id="userInput" 
            class="chat-input" 
            placeholder="Type your message..."
            rows="1"
          ></textarea>
          <button class="send-button" id="sendButton" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Check if backend is running on page load
    async function checkBackendStatus() {
      try {
        const response = await fetch('http://localhost:8000/ping');
        if (response.ok) {
          console.log('✅ Backend is connected');
          document.querySelector('.header-subtitle').innerHTML = `
            <div class="status-dot"></div>
            Online • Ready to help
          `;
        }
      } catch (err) {
        console.error('❌ Backend is not running');
        document.querySelector('.header-subtitle').innerHTML = `
            <div class="status-dot" style="background: #ef4444;"></div>
            Offline • Backend not connected
          `;
        addMessage('⚠️ Backend integration coming soon! Once the API is connected I\'ll answer your questions live. For now, please use the Contact page or call us directly.', 'bot');
      }
    }

    function createParticles() {
      const container = document.getElementById('bgAnimation');
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.width = Math.random() * 4 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
        container.appendChild(particle);
      }
    }

    const input = document.getElementById('userInput');
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;
      
      addMessage(msg, 'user');
      input.value = '';
      input.style.height = 'auto';
      showTypingIndicator();
      
      try {
        const data = await chatbotAPI.send(msg);
        hideTypingIndicator();
        addMessage(data.reply || 'I am here to help!', 'bot');
      } catch (err) {
        console.error('Chatbot error:', err);
        hideTypingIndicator();
        addMessage('⚠️ Backend integration coming soon! Once the API is connected I\'ll answer your questions live. For now, please use the Contact page or call us directly.', 'bot');
      }
    }

    function sendQuickMessage(message) {
      input.value = message;
      sendMessage();
    }

    function addMessage(message, sender) {
      const chatBody = document.getElementById('chatBody');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      
      if (sender === 'user') {
        messageDiv.innerHTML = `
          <div class="message-avatar">You</div>
          <div>
            <div class="message-content">${message}</div>
            <div class="message-time">${time}</div>
          </div>
        `;
      } else {
        messageDiv.innerHTML = `
          <div class="message-avatar">AI</div>
          <div>
            <div class="message-content">${message}</div>
            <div class="message-time">${time}</div>
          </div>
        `;
      }
      chatBody.appendChild(messageDiv);
      scrollToBottom();
    }

    function showTypingIndicator() {
      const chatBody = document.getElementById('chatBody');
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typingIndicator';
      typingDiv.className = 'message bot typing-indicator';
      typingDiv.innerHTML = `
        <div class="message-avatar">AI</div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatBody.appendChild(typingDiv);
      scrollToBottom();
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    function scrollToBottom() {
      const chatBody = document.getElementById('chatBody');
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function toggleMenu() {
      addMessage('⚙️ Menu options: Settings, History, Help, Logout', 'bot');
    }

    createParticles();
    checkBackendStatus();
  </script>
</body>
</html>
