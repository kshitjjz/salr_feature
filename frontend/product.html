<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vishal Sales - Product Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #00bfff;
      --secondary-blue: #0066cc;
      --dark-bg: #0b0c1e;
      --card-bg: #1b1c33;
      --card-bg-hover: #20224a;
      --accent-gold: #ffcc00;
      --success-green: #00ff99;
      --text-light: #ddd;
      --sidebar-bg: rgba(13, 27, 42, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--dark-bg), #1a1a2e, #16213e);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--dark-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      border-radius: 10px;
    }

    /* Header Section */
    .header-section {
      background: linear-gradient(135deg, var(--sidebar-bg), rgba(27, 28, 51, 0.8));
      backdrop-filter: blur(10px);
      padding: 20px 0;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(0, 191, 255, 0.2);
    }

    .breadcrumb-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    .breadcrumb-nav a {
      color: var(--primary-blue);
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .breadcrumb-nav a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px var(--primary-blue);
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(45deg, var(--primary-blue), #ffffff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    /* Back Button */
    .btn-back {
      background: linear-gradient(45deg, #6c757d, #495057);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 30px;
    }

    .btn-back:hover {
      background: linear-gradient(45deg, #495057, #343a40);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      color: white;
    }

    /* Main Product Card */
    .product-card {
      background: linear-gradient(145deg, var(--card-bg), var(--card-bg-hover));
      border: 1px solid rgba(0, 191, 255, 0.2);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 191, 255, 0.05), transparent 70%);
      pointer-events: none;
    }

    /* Product Image Section */
    .product-image-section {
      background: linear-gradient(135deg, #ffffff, #f8f9fa);
      border-radius: 20px;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .product-image-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, rgba(0, 191, 255, 0.05), transparent 50%);
      pointer-events: none;
    }

    .product-image {
      max-width: 100%;
      max-height: 450px;
      object-fit: contain;
      border-radius: 15px;
      transition: transform 0.3s ease;
      z-index: 2;
      position: relative;
    }

    .product-image:hover {
      transform: scale(1.05);
    }

    /* Product Details Section */
    .product-details {
      padding-left: 30px;
    }

    .product-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary-blue);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .product-brand {
      background: rgba(0, 191, 255, 0.1);
      color: var(--primary-blue);
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 25px;
      border: 1px solid rgba(0, 191, 255, 0.3);
    }

    /* Pricing Section */
    .pricing-section {
      background: linear-gradient(135deg, rgba(0, 255, 153, 0.1), rgba(0, 191, 255, 0.1));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 25px;
      border: 1px solid rgba(0, 255, 153, 0.3);
    }

    .discounted-price {
      color: var(--success-green);
      font-size: 2.2rem;
      font-weight: bold;
      margin-right: 15px;
    }

    .original-price {
      color: #888;
      text-decoration: line-through;
      font-size: 1.5rem;
      margin-right: 15px;
    }

    .discount-badge {
      background: linear-gradient(45deg, #ff4d4d, #ff1a1a);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: bold;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    /* Rating Section */
    .rating-section {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
      padding: 15px;
      background: rgba(255, 204, 0, 0.1);
      border-radius: 15px;
      border: 1px solid rgba(255, 204, 0, 0.3);
    }

    .rating-stars {
      color: var(--accent-gold);
      font-size: 1.5rem;
    }

    .rating-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    .rating-label {
      color: var(--text-light);
      font-size: 0.9rem;
    }

    /* Section Headers */
    .section-header {
      color: var(--primary-blue);
      font-size: 1.5rem;
      font-weight: bold;
      margin: 30px 0 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section-header::before {
      content: '';
      width: 4px;
      height: 25px;
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      border-radius: 2px;
    }

    /* Offers Section */
    .offers-section {
      background: linear-gradient(135deg, rgba(0, 255, 153, 0.05), rgba(0, 191, 255, 0.05));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(0, 255, 153, 0.2);
    }

    .offer-item {
      background: rgba(0, 255, 153, 0.1);
      padding: 12px 18px;
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 4px solid var(--success-green);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .offer-item:hover {
      background: rgba(0, 255, 153, 0.15);
      transform: translateX(5px);
    }

    .offer-item:last-child {
      margin-bottom: 0;
    }

    .offer-icon {
      color: var(--success-green);
      font-size: 1.2rem;
    }

    /* Specifications Section */
    .specs-section {
      background: linear-gradient(135deg, rgba(27, 28, 51, 0.8), rgba(32, 34, 74, 0.5));
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(0, 191, 255, 0.2);
    }

    .spec-item {
      padding: 15px 20px;
      border-bottom: 1px solid rgba(0, 191, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.3s ease;
    }

    .spec-item:hover {
      background: rgba(0, 191, 255, 0.05);
      transform: translateX(5px);
    }

    .spec-item:last-child {
      border-bottom: none;
    }

    .spec-icon {
      color: var(--primary-blue);
      font-size: 1.1rem;
      width: 20px;
    }

    .spec-key {
      font-weight: 600;
      color: var(--primary-blue);
      min-width: 150px;
    }

    .spec-value {
      color: var(--text-light);
    }

    /* Action Buttons */
    .action-section {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-buy {
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(0, 191, 255, 0.3);
    }

    .btn-buy:hover {
      background: linear-gradient(45deg, var(--secondary-blue), #004499);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0, 191, 255, 0.5);
      color: white;
    }

    .btn-wishlist {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-light);
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 13px 30px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-wishlist:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--primary-blue);
      color: var(--primary-blue);
      transform: translateY(-2px);
    }

    /* Loading State */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 400px;
      flex-direction: column;
      gap: 20px;
    }

    .spinner {
      border: 3px solid rgba(0, 191, 255, 0.3);
      border-top: 3px solid var(--primary-blue);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: var(--primary-blue);
      font-size: 1.2rem;
      font-weight: 500;
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .error-state i {
      font-size: 4rem;
      color: #ff4d4d;
      margin-bottom: 20px;
    }

    .error-state h3 {
      color: #ff4d4d;
      margin-bottom: 15px;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Vendor Comparison Section */
    .vendor-comparison {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .vendor-card {
      background: linear-gradient(145deg, rgba(27, 28, 51, 0.8), rgba(32, 34, 74, 0.6));
      border: 2px solid rgba(0, 191, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .vendor-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary-blue);
      box-shadow: 0 10px 30px rgba(0, 191, 255, 0.3);
    }

    .vendor-card.best-price {
      border-color: var(--accent-gold);
      background: linear-gradient(145deg, rgba(255, 204, 0, 0.1), rgba(27, 28, 51, 0.8));
    }

    .best-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: linear-gradient(45deg, var(--accent-gold), #ffa500);
      color: var(--dark-bg);
      padding: 5px 15px;
      border-radius: 0 15px 0 15px;
      font-size: 0.75rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 4px 10px rgba(255, 204, 0, 0.4);
    }

    .vendor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .vendor-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--primary-blue);
      margin: 0;
    }

    .vendor-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--accent-gold);
      font-size: 0.9rem;
      font-weight: bold;
    }

    .vendor-price {
      margin: 15px 0;
    }

    .vendor-discount-price {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--success-green);
      margin-bottom: 5px;
    }

    .vendor-original-price {
      font-size: 1rem;
      color: #888;
      text-decoration: line-through;
      margin-right: 10px;
    }

    .vendor-discount-badge {
      background: linear-gradient(45deg, #ff6b35, #f7931e);
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .vendor-buy-btn {
      display: block;
      width: 100%;
      background: linear-gradient(45deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 15px;
    }

    .vendor-buy-btn:hover {
      background: linear-gradient(45deg, var(--secondary-blue), #004499);
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 191, 255, 0.4);
      color: white;
    }

    .vendor-card.best-price .vendor-buy-btn {
      background: linear-gradient(45deg, var(--accent-gold), #ffa500);
      color: var(--dark-bg);
    }

    .vendor-card.best-price .vendor-buy-btn:hover {
      background: linear-gradient(45deg, #ffa500, #ff8c00);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .product-details {
        padding-left: 0;
        margin-top: 30px;
      }
      
      .product-title {
        font-size: 1.8rem;
      }
      
      .discounted-price {
        font-size: 1.8rem;
      }
      
      .original-price {
        font-size: 1.2rem;
      }
      
      .action-section {
        flex-direction: column;
      }
      
      .btn-buy, .btn-wishlist {
        width: 100%;
        justify-content: center;
      }
      
      .spec-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
      
      .spec-key {
        min-width: auto;
      }
      .vendor-comparison {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 576px) {
      .product-card {
        padding: 20px;
      }
      
      .page-title {
        font-size: 1.8rem;
      }
      
      .section-header {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header Section -->
  <div class="header-section">
    <div class="container">
      <div class="breadcrumb-nav">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <i class="fas fa-chevron-right"></i>
        <a href="mobile.html"><i class="fas fa-mobile-alt"></i> Mobiles</a>
        <i class="fas fa-chevron-right"></i>
        <span>Product Details</span>
      </div>
      <h1 class="page-title">📱 Product Details</h1>
    </div>
  </div>

  <div class="container">
    <a href="mobile.html" class="btn-back">
      <i class="fas fa-arrow-left"></i> Back to Mobiles
    </a>
    
    <div id="product-details">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading product details...</div>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");
    const productDetailsContainer = document.getElementById("product-details");

    if (!productId) {
      productDetailsContainer.innerHTML = `
        <div class="error-state">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Invalid Product</h3>
          <p>No product ID specified. Please select a product from the mobile listings.</p>
          <a href="mobile.html" class="btn-buy mt-3">
            <i class="fas fa-arrow-left"></i> Back to Products
          </a>
        </div>
      `;
      return;
    }

    fetch(`http://127.0.0.1:8000/api/product/${productId}`)
      .then(response => {
        console.log('Response status:', response.status);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(product => {
        console.log('Product data received:', product);
        if (!product) {
          productDetailsContainer.innerHTML = `
            <div class="error-state">
              <i class="fas fa-search"></i>
              <h3>Product Not Found</h3>
              <p>The requested product could not be found in our database.</p>
              <a href="mobile.html" class="btn-buy mt-3">
                <i class="fas fa-arrow-left"></i> Back to Products
              </a>
            </div>
          `;
          return;
        }

        // Get all vendors data
        let vendors = [];
        let bestVendor = null;
        let lowestPrice = Infinity;
        let vendorName = 'N/A';
        let affiliateLink = '#';
        
        if (product.vendors) {
          Object.entries(product.vendors).forEach(([name, details]) => {
            if (details && details.discountprice) {
              vendors.push({
                name: name,
                price: details.price || 0,
                discountprice: details.discountprice || 0,
                rating: details.rating || 0,
                affiliatelink: details.affiliatelink || '#',
                offers: details.offers || []
              });
              
              if (details.discountprice < lowestPrice) {
                lowestPrice = details.discountprice;
                bestVendor = details;
                vendorName = name;
                affiliateLink = details.affiliatelink || '#';
              }
            }
          });
        }

        const originalPrice = bestVendor ? bestVendor.price : 0;
        const discountedPrice = bestVendor ? bestVendor.discountprice : 0;
        const discountPercentage = originalPrice > 0 ? Math.round(((originalPrice - discountedPrice) / originalPrice) * 100) : 0;
        const rating = bestVendor?.rating || 'N/A';

        // Format prices and calculate discount
        const formatPrice = (price) => `₹${new Intl.NumberFormat('en-IN').format(price)}`;
        const calculateDiscount = (original, discount) => Math.round(((original - discount) / original) * 100);

        // Generate vendor comparison cards
        let vendorCardsHTML = '';
        if (vendors.length > 0) {
          vendorCardsHTML = `
            <h2 class="section-header">
              <i class="fas fa-store"></i> Compare Prices Across Stores
            </h2>
            <div class="vendor-comparison">
              ${vendors.map(vendor => {
                const discount = calculateDiscount(vendor.price, vendor.discountprice);
                const isBestPrice = vendor.discountprice === lowestPrice;
                return `
                  <div class="vendor-card ${isBestPrice ? 'best-price' : ''}">
                    ${isBestPrice ? '<div class="best-badge"><i class="fas fa-crown"></i> Best Price</div>' : ''}
                    <div class="vendor-header">
                      <h6 class="vendor-name">${vendor.name}</h6>
                      ${vendor.rating > 0 ? `
                        <div class="vendor-rating">
                          <i class="fas fa-star"></i> ${vendor.rating}
                        </div>
                      ` : ''}
                    </div>
                    <div class="vendor-price">
                      <span class="vendor-discount-price">${formatPrice(vendor.discountprice)}</span>
                      ${vendor.price > vendor.discountprice ? `
                        <span class="vendor-original-price">${formatPrice(vendor.price)}</span>
                        <span class="vendor-discount-badge">${discount}% OFF</span>
                      ` : ''}
                    </div>
                    <a href="${vendor.affiliatelink}" target="_blank" class="vendor-buy-btn">
                      <i class="fas fa-shopping-cart"></i> Buy Now
                    </a>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }

        // Generate offers HTML from best vendor
        let offersHTML = "";
        if (bestVendor && bestVendor.offers && bestVendor.offers.length > 0) {
          offersHTML = `
            <h2 class="section-header">
              <i class="fas fa-gift"></i> Special Offers from ${vendorName}
            </h2>
            <div class="offers-section">
          `;
          bestVendor.offers.forEach(offer => {
            if (offer && offer.trim()) {
              offersHTML += `
                <div class="offer-item">
                  <i class="fas fa-check-circle offer-icon"></i>
                  <span>${offer}</span>
                </div>
              `;
            }
          });
          offersHTML += "</div>";
        }

        // Generate specifications HTML from features
        let specsHTML = "";
        if (product.features && product.features.details) {
          const details = product.features.details;
          const specs = {};
          
          // Extract relevant specs
          if (details.storage) {
            if (details.storage.ram) specs['RAM'] = details.storage.ram;
            if (details.storage.rom) specs['Storage'] = details.storage.rom;
          }
          if (details.performance) {
            if (details.performance.processor) specs['Processor'] = details.performance.processor;
            if (details.performance.operating_system) specs['Operating System'] = details.performance.operating_system;
          }
          if (details.display) {
            if (details.display.screen_size) specs['Display'] = details.display.screen_size;
            if (details.display.resolution) specs['Resolution'] = details.display.resolution;
          }
          if (details.design) {
            if (details.design.weight) specs['Weight'] = details.design.weight;
            if (details.design.color) specs['Color'] = details.design.color;
          }
          if (details.battery) {
            if (details.battery.battery_capacity) specs['Battery'] = details.battery.battery_capacity;
          }
          if (details['network&connectivity']) {
            if (details['network&connectivity'].sim) specs['SIM'] = details['network&connectivity'].sim;
            if (details['network&connectivity'].connectivity) specs['Connectivity'] = details['network&connectivity'].connectivity;
          }

          if (Object.keys(specs).length > 0) {
            specsHTML = `
              <h2 class="section-header">
                <i class="fas fa-cog"></i> Technical Specifications
              </h2>
              <div class="specs-section">
            `;
            for (const [key, value] of Object.entries(specs)) {
              specsHTML += `
                <div class="spec-item">
                  <i class="fas fa-circle spec-icon"></i>
                  <span class="spec-key">${key}</span>
                  <span class="spec-value">${value}</span>
                </div>
              `;
            }
            specsHTML += "</div>";
          }
        }

        // Generate rating stars
        const ratingNum = parseFloat(rating) || 0;
        const fullStars = Math.floor(ratingNum);
        const hasHalfStar = ratingNum % 1 !== 0;
        const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
        
        let starsHTML = "";
        for (let i = 0; i < fullStars; i++) {
          starsHTML += '<i class="fas fa-star"></i>';
        }
        if (hasHalfStar) {
          starsHTML += '<i class="fas fa-star-half-alt"></i>';
        }
        for (let i = 0; i < emptyStars; i++) {
          starsHTML += '<i class="far fa-star"></i>';
        }

        // Get image URL
        const imageUrl = product.image?.thumbnail || product.image?.urls?.[0] || 'https://via.placeholder.com/400x400?text=No+Image';

        productDetailsContainer.innerHTML = `
          <div class="product-card">
            <div class="row g-4 align-items-center">
              <!-- Product Image -->
              <div class="col-lg-5">
                <div class="product-image-section">
                  <img src="${imageUrl}" alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                </div>
              </div>

              <!-- Product Details -->
              <div class="col-lg-7">
                <div class="product-details">
                  <h1 class="product-title">${product.title}</h1>
                  
                  <div class="product-brand">
                    <i class="fas fa-tag"></i>
                    <span><strong>Brand:</strong> ${product.brand}</span>
                  </div>

                  <div class="pricing-section">
                    <div class="d-flex align-items-center flex-wrap gap-3">
                      <span class="discounted-price">${formatPrice(discountedPrice)}</span>
                      <span class="original-price">${formatPrice(originalPrice)}</span>
                      ${discountPercentage > 0 ? `<span class="discount-badge">${discountPercentage}% OFF</span>` : ''}
                    </div>
                    <div class="mt-2" style="color: var(--text-light); font-size: 0.9rem;">
                      <i class="fas fa-store"></i> Best price from <strong>${vendorName}</strong>
                    </div>
                  </div>

                  ${ratingNum > 0 ? `
                  <div class="rating-section">
                    <div class="rating-stars">
                      ${starsHTML}
                    </div>
                    <span class="rating-value">${rating}</span>
                    <span class="rating-label">out of 5</span>
                  </div>
                  ` : ''}

                  <div class="action-section">
                    <a href="${affiliateLink}" target="_blank" class="btn-buy">
                      <i class="fas fa-shopping-cart"></i>
                      Buy on ${vendorName}
                    </a>
                    <button class="btn-wishlist" onclick="addToWishlist('${productId}')">
                      <i class="fas fa-heart"></i>
                      Add to Wishlist
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Additional Information -->
            <div class="row mt-5">
              <div class="col-12">
                ${vendorCardsHTML}
                ${offersHTML}
                ${specsHTML}
              </div>
            </div>
          </div>
        `;
      })
      .catch(err => {
        console.error("Detailed error:", err);
        console.error("Error message:", err.message);
        console.error("Error stack:", err.stack);
        productDetailsContainer.innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Failed to Load Product</h3>
            <p>There was an error loading the product details. Please make sure the backend server is running.</p>
            <p class="text-muted">Error: ${err.message}</p>
            <a href="mobile.html" class="btn-buy mt-3">
              <i class="fas fa-arrow-left"></i> Back to Products
            </a>
          </div>
        `;
      });
  });

  // Wishlist functionality (placeholder)
  function addToWishlist(productId) {
    // Here you would typically save to localStorage or send to server
    alert(`Product added to wishlist! (Product ID: ${productId})`);
    
    // Visual feedback
    const btn = event.target;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Added to Wishlist';
    btn.style.background = 'var(--success-green)';
    btn.style.color = 'white';
    
    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.style.background = '';
      btn.style.color = '';
    }, 2000);
  }
  </script>
</body>
</html>
